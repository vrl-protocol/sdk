name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-python:
    name: Test Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          cd sdk/python
          pip install -e .[dev]

      - name: Run tests
        run: |
          cd sdk/python
          pytest tests/ -v

  test-typescript:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        run: |
          cd sdk/typescript
          npm test

  test-go:
    name: Test Go SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        run: |
          cd sdk/go
          go test ./... -v
